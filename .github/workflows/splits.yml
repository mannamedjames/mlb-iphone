name: Daily Team Splits & Reds HRs

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  splits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pybaseball pandas numpy
      - name: Run team splits + Reds HRs
        run: python mlb_team_splits.py
      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "splits: $(date -u +'%Y-%m-%d %H:%M UTC')" && git pull --rebase origin main && git push)
