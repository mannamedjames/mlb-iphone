name: Daily Team Splits & Reds HRs

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  splits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pybaseball pandas numpy
      - name: Run team splits + Reds HRs
        run: python mlb_team_splits.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "splits: ${{ github.run_id }}"
          file_pattern: data/*
