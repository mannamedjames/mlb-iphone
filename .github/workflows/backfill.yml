name: Backfill Matchup History (one-time)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pybaseball pandas numpy
      - name: Run backfill
        run: python backfill_history.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "backfill: matchup history"
          file_pattern: data/*
