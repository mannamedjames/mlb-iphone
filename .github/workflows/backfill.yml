name: Backfill Matchup History (one-time)

on:
  workflow_dispatch:

concurrency:
  group: data-writers
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pybaseball pandas numpy
      - name: Run backfill
        run: python backfill_history.py
      - name: Commit results (with retry)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && { echo "nothing to commit"; exit 0; }
          git commit -m "backfill: matchup history"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected, rebasing onto latest main (attempt $i)"
            git pull --rebase origin main
          done
          exit 1
